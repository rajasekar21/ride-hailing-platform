
apiVersion: apps/v1
kind: Deployment
metadata: {name: user}
spec:
  replicas: 1
  selector: {matchLabels: {app: user}}
  template:
    metadata: {labels: {app: user}}
    spec:
      containers:
      - name: user
        image: user
        imagePullPolicy: Never
        ports: [{containerPort: 3000}]
---
apiVersion: v1
kind: Service
metadata: {name: user}
spec:
  type: NodePort
  selector: {app: user}
  ports: [{port: 3000, nodePort: 303000}]
