apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
      - name: notification
        image: notification
        imagePullPolicy: Never
        env:
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: RABBITMQ_URL
        - name: EVENTS_EXCHANGE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: EVENTS_EXCHANGE
        - name: NOTIFICATION_QUEUE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: NOTIFICATION_QUEUE
        ports:
        - containerPort: 3000

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: notification
spec:
  selector:
    app: notification
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
