apiVersion: apps/v1
kind: Deployment
metadata:
  name: driver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: driver
  template:
    metadata:
      labels:
        app: driver
    spec:
      containers:
      - name: driver
        image: driver
        imagePullPolicy: Never
        env:
        - name: DB_PATH
          value: /data/drivers.db
        ports:
        - containerPort: 3000

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: driver-storage
          mountPath: /data
      volumes:
      - name: driver-storage
        persistentVolumeClaim:
          claimName: driver-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: driver
spec:
  selector:
    app: driver
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
