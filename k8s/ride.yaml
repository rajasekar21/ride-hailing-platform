
apiVersion: apps/v1
kind: Deployment
metadata: {name: ride}
spec:
  replicas: 1
  selector: {matchLabels: {app: ride}}
  template:
    metadata: {labels: {app: ride}}
    spec:
      containers:
      - name: ride
        image: ride
        imagePullPolicy: Never
        env:
        - name: DB_PATH
          value: /data/rides.db
        - name: DRIVER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: DRIVER_SERVICE_URL
        - name: PAYMENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: PAYMENT_SERVICE_URL
        - name: NOTIFICATION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: NOTIFICATION_SERVICE_URL
        - name: CANCELLATION_FEE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: CANCELLATION_FEE
        - name: RABBITMQ_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: RABBITMQ_URL
        - name: EVENTS_EXCHANGE
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: EVENTS_EXCHANGE
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        ports: [{containerPort: 3000}]
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: ride-storage
          mountPath: /data
      volumes:
      - name: ride-storage
        persistentVolumeClaim:
          claimName: ride-pvc
---
apiVersion: v1
kind: Service
metadata: {name: ride}
spec:
  type: NodePort
  selector: {app: ride}
  ports: [{port: 3000, nodePort: 30300}]
