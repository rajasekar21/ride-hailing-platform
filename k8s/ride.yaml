
apiVersion: apps/v1
kind: Deployment
metadata: {name: ride}
spec:
  replicas: 1
  selector: {matchLabels: {app: ride}}
  template:
    metadata: {labels: {app: ride}}
    spec:
      containers:
      - name: ride
        image: ride
        imagePullPolicy: Never
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        ports: [{containerPort: 3000}]
---
apiVersion: v1
kind: Service
metadata: {name: ride}
spec:
  type: NodePort
  selector: {app: ride}
  ports: [{port: 3000, nodePort: 30300}]
