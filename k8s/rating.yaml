apiVersion: apps/v1
kind: Deployment
metadata:
  name: rating
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rating
  template:
    metadata:
      labels:
        app: rating
    spec:
      containers:
      - name: rating
        image: rating
        imagePullPolicy: Never
        env:
        - name: DB_PATH
          value: /data/ratings.db
        - name: TRIP_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: TRIP_SERVICE_URL
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: rating-storage
          mountPath: /data
      volumes:
      - name: rating-storage
        persistentVolumeClaim:
          claimName: rating-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rating
spec:
  selector:
    app: rating
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
